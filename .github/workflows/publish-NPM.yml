name: Publish
on:
  push:
    branches:
      - beta
      - canary
      - main
      - master

jobs:
  app:
    uses: chlbri/node-github-actions/.github/workflows/publish.yml@main
    secrets: inherit
    with:
      type: ${{ github.ref_name == 'beta' && 'beta' || github.ref_name ==
        'canary' && 'canary' || 'latest' }}

      package: "./packages/app"

  vitest:
    uses: chlbri/node-github-actions/.github/workflows/publish.yml@main
    secrets: inherit
    with:
      type: ${{ github.ref_name == 'beta' && 'beta' || github.ref_name ==
        'canary' && 'canary' || 'latest' }}

      package: "./packages/vitest"

  solidjs:
    uses: chlbri/node-github-actions/.github/workflows/publish.yml@main
    secrets: inherit
    with:
      type: ${{ github.ref_name == 'beta' && 'beta' || github.ref_name ==
        'canary' && 'canary' || 'latest' }}

      package: "./packages/solidjs"
